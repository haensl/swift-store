name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and changelog
        id: changelog
        run: |
          VERSION=$(grep -m1 '^## ' CHANGELOG.md | sed 's/## //')

          NOTES=$(awk '
            /^## / { if (p) exit; p=1; next }
            p { print }
          ' CHANGELOG.md)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Fail if no version found
        run: |
          if [ -z "${{ steps.changelog.outputs.version }}" ]; then
            echo "No version found in CHANGELOG.md"
            exit 1
          fi

      - name: Check if tag exists
        id: tagcheck
        run: |
          if git rev-parse "refs/tags/v${{ steps.changelog.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.tagcheck.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.version }}
          name: ${{ steps.changelog.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
